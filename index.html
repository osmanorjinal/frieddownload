
<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>frieddownload.com</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif}
body{background:#181818;color:#fff}
header{background:#d62828;padding:22px;text-align:center;box-shadow:0 4px 15px rgba(0,0,0,.3)}
header h1{font-size:34px}
.search{max-width:750px;margin:30px auto;display:flex;gap:10px;padding:0 15px}
.search input{flex:1;padding:14px;border:none;border-radius:10px;font-size:16px}
.search button{padding:14px 24px;border:none;border-radius:10px;background:#ffb300;font-weight:bold;cursor:pointer}
.container{max-width:900px;margin:auto;padding:15px}
.item{background:#252525;border-left:6px solid #ffb300;padding:18px;border-radius:10px;margin-bottom:15px}
.item h2{margin-bottom:10px;color:#ffd54f}
.item a{display:inline-block;background:#d62828;color:#fff;text-decoration:none;padding:10px 18px;border-radius:8px}
footer{text-align:center;color:#888;padding:25px}
</style>
</head>
<body>

<header>
<h1>🍟 frieddownload.com</h1>
</header>

<div class="search">
<input id="searchInput" type="text" placeholder="Dosya ara..." onkeyup="searchFiles()">
<button onclick="searchFiles()">Ara</button>
</div>

<div class="container">

<!-- DOSYALARI BURAYA EKLE

<div class="item">
<h2>Dosya İsmi</h2>
<a href="https://link.com">Download</a>
</div>

-->

</div>

<footer>© 2026 frieddownload.com</footer>

<script>
function searchFiles(){
const q=document.getElementById("searchInput").value.toLowerCase();
document.querySelectorAll(".item").forEach(el=>{
el.style.display=el.querySelector("h2").textContent.toLowerCase().includes(q)?"block":"none";
});
}
</script>

</body>
</html>
